version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: safetyiq_db
    environment:
      POSTGRES_USER: safetyiq
      POSTGRES_PASSWORD: safetyiq_password
      POSTGRES_DB: safetyiq_db
    ports:
      - "5432:5432"
    volumes:
      - safetyiq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyiq -d safetyiq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  safetyiq_postgres_data:
